name: Question
description: Ask how to use RepoMori.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Ask usage questions here. Do not include private source, secrets, generated `.repomori` packs, or private handoff artifacts.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RepoMori version
      placeholder: "0.2.1"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11"
    validations:
      required: false
  - type: textarea
    id: command
    attributes:
      label: Command tried
      description: Include a minimal command with private paths redacted.
      render: powershell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Safety confirmation
      options:
        - label: I have not included secrets, private source, private `.repomori` packs, or private handoff artifacts.
          required: true
