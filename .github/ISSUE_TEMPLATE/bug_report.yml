name: Bug report
description: Report a reproducible RepoMori defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not attach private repositories, secrets, generated `.repomori` packs, or handoff directories from private source.
  - type: input
    id: version
    attributes:
      label: RepoMori version
      description: Run `python -m repomori --version` if available, or provide the tag/commit.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Include the exact command, with private paths redacted.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Redact private source paths, secrets, customer data, and generated source-bearing artifacts.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Safety confirmation
      options:
        - label: I have not included secrets, private source, private `.repomori` packs, or private handoff artifacts.
          required: true
