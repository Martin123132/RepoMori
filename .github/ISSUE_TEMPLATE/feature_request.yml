name: Feature request
description: Suggest a RepoMori improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep proposals focused on local-only, model-free RepoMori behavior unless you are explicitly proposing an optional integration boundary.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Packs and queries
        - Context and handoff
        - Memory snapshots
        - Release and governance checks
        - Agent or MCP bridge
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Safety confirmation
      options:
        - label: This request does not require uploading private source, generated packs, or private handoff artifacts.
          required: true
