name: memory-anchor-smoke

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository root to snapshot."
        required: false
        default: "."
        type: string
      out_dir:
        description: "Output directory for snapshot and anchor smoke artifacts."
        required: false
        default: ".repomori-smoke"
        type: string

jobs:
  smoke:
    name: matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run memory anchor profile smoke matrix
        id: run
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE_DIR="${GITHUB_WORKSPACE:-$(pwd)}"
          sanitize_input() {
            case "${1:-}" in
              ""|"null") printf ""; ;;
              *) printf "%s" "$1" ;;
            esac
          }

          REPO_INPUT=$(sanitize_input "${{ github.event.inputs.repo }}")
          BASE_DIR_NAME=$(sanitize_input "${{ github.event.inputs.out_dir }}")
          if [ -f "$GITHUB_EVENT_PATH" ]; then
            EVENT_REPO="$(python -c "import json,sys; event=json.load(open(sys.argv[1])); print((event.get('inputs') or {}).get('repo','') or '')" "$GITHUB_EVENT_PATH")"
            EVENT_OUT_DIR="$(python -c "import json,sys; event=json.load(open(sys.argv[1])); print((event.get('inputs') or {}).get('out_dir','') or '')" "$GITHUB_EVENT_PATH")"
            if [ -z "$REPO_INPUT" ]; then
              REPO_INPUT=$(sanitize_input "$EVENT_REPO")
            fi
            if [ -z "$BASE_DIR_NAME" ]; then
              BASE_DIR_NAME=$(sanitize_input "$EVENT_OUT_DIR")
            fi
          else
            :
          fi

          if [ -z "$REPO_INPUT" ]; then
            REPO="."
          else
            REPO="$REPO_INPUT"
          fi

          if [ -z "$BASE_DIR_NAME" ]; then
            BASE_DIR_NAME=".repomori-smoke"
          fi

          BASE_DIR="${WORKSPACE_DIR}/${BASE_DIR_NAME}"
          MODES=(strict safe legacy)
          mkdir -p "$BASE_DIR"
          echo "artifact_dir=$BASE_DIR" >> "$GITHUB_OUTPUT"

          for mode in "${MODES[@]}"; do
            MODE_DIR="${BASE_DIR}/${mode}"
            OUT_DIR="${MODE_DIR}/packs"
            mkdir -p "$OUT_DIR"
            REPORT="${BASE_DIR}/memory-anchor-${mode}.json"
            python -m repomori memory "$REPO" \
              --out-dir "$OUT_DIR" \
              --no-handoff \
              --anchor-out "${MODE_DIR}/timeline-anchor.json" \
              --anchor-freshness "$mode" \
              --anchor-verify \
              --json > "$REPORT"

            if [ ! -s "$REPORT" ]; then
              echo "::error::memory-anchor-smoke: missing or empty report for mode '$mode' at '$REPORT'."
              exit 1
            fi

            if [ ! -s "${MODE_DIR}/timeline-anchor.json" ]; then
              echo "::error::memory-anchor-smoke: anchor file was not written for mode '$mode' at '${MODE_DIR}/timeline-anchor.json'."
              exit 1
            fi

            python - <<'PY' "$REPORT" "$mode"
            import json
            import sys
            from pathlib import Path

            report = Path(sys.argv[1])
            mode = sys.argv[2]
            payload = json.loads(report.read_text(encoding="utf-8"))
            summary = payload.get("summary", {})
            anchor = summary.get("anchor_freshness")
            status = payload.get("status")
            if anchor != mode:
                raise SystemExit(f"anchor_freshness mismatch for mode={mode}: {anchor}")
            if status not in {"pass", "warn"}:
                raise SystemExit(f"memory status not acceptable for mode={mode}: {status}")
            print(f"mode={mode} status={status}")
            PY
          done

          for mode in "${MODES[@]}"; do
            REPORT="${BASE_DIR}/memory-anchor-${mode}.json"
            if [ ! -f "$REPORT" ] || [ ! -s "$REPORT" ]; then
              echo "::error::memory-anchor-smoke: expected report missing or empty: '$REPORT'."
              exit 1
            fi
          done

          for mode in "${MODES[@]}"; do
            MODE_DIR="${BASE_DIR}/${mode}"
            if [ ! -s "${MODE_DIR}/timeline-anchor.json" ]; then
              echo "::error::memory-anchor-smoke: per-mode anchor missing or empty: '${MODE_DIR}/timeline-anchor.json'."
              exit 1
            fi
          done

      - name: Archive anchor smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repomori-memory-anchor-smoke
          path: |
            ${{ steps.run.outputs.artifact_dir }}/memory-anchor-strict.json
            ${{ steps.run.outputs.artifact_dir }}/memory-anchor-safe.json
            ${{ steps.run.outputs.artifact_dir }}/memory-anchor-legacy.json
            ${{ steps.run.outputs.artifact_dir }}/strict/timeline-anchor.json
            ${{ steps.run.outputs.artifact_dir }}/safe/timeline-anchor.json
            ${{ steps.run.outputs.artifact_dir }}/legacy/timeline-anchor.json
          include-hidden-files: true
