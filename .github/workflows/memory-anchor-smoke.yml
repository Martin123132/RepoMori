name: memory-anchor-smoke

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository root to snapshot."
        required: false
        default: "."
        type: string
      out_dir:
        description: "Output directory for snapshot and anchor smoke artifacts."
        required: false
        default: ".repomori-smoke"
        type: string
  workflow_call:
    inputs:
      repo:
        description: "Repository root to snapshot."
        required: false
        type: string
        default: "."
      out_dir:
        description: "Output directory for snapshot and anchor smoke artifacts."
        required: false
        type: string
        default: ".repomori-smoke"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run memory anchor profile smoke matrix
        id: run
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE_DIR="${GITHUB_WORKSPACE:-$(pwd)}"
          REPO_INPUT="${{ github.event.inputs.repo || inputs.repo || '.' }}"
          BASE_DIR_NAME="${{ github.event.inputs.out_dir || inputs.out_dir || '.repomori-smoke' }}"

          REPO="${REPO_INPUT:-.}"

          BASE_DIR="${WORKSPACE_DIR}/${BASE_DIR_NAME}"
          MODES=(strict safe legacy)
          mkdir -p "$BASE_DIR"
          echo "artifact_dir=$BASE_DIR" >> "$GITHUB_OUTPUT"

          for mode in "${MODES[@]}"; do
            MODE_DIR="${BASE_DIR}/${mode}"
            OUT_DIR="${MODE_DIR}/packs"
            mkdir -p "$OUT_DIR"
            REPORT="${BASE_DIR}/memory-anchor-${mode}.json"
            if ! python -m repomori memory "$REPO" \
              --out-dir "$OUT_DIR" \
              --no-handoff \
              --anchor-out "${MODE_DIR}/timeline-anchor.json" \
              --anchor-freshness "$mode" \
              --anchor-verify \
              --json > "$REPORT"; then
              echo "::error::memory-anchor-smoke: repomori memory failed for mode '${mode}'."
              exit 1
            fi

            if [ ! -s "$REPORT" ]; then
              echo "::error::memory-anchor-smoke: missing or empty report for mode '$mode' at '$REPORT'."
              exit 1
            fi

            if [ ! -s "${MODE_DIR}/timeline-anchor.json" ]; then
              echo "::error::memory-anchor-smoke: anchor file was not written for mode '$mode' at '${MODE_DIR}/timeline-anchor.json'."
              exit 1
            fi

            REPORT_PATH="$REPORT" MODE="$mode" python -c "import json, os; from pathlib import Path; report=Path(os.environ['REPORT_PATH']); mode=os.environ['MODE']; payload=json.loads(report.read_text(encoding='utf-8')); summary=payload.get('summary', {}); anchor=summary.get('anchor_freshness'); status=payload.get('status'); assert anchor == mode, f'anchor_freshness mismatch for mode={mode}: {anchor}'; assert status in {'pass','warn'}, f'memory status not acceptable for mode={mode}: {status}'; print(f'mode={mode} status={status}')"
          done

          for mode in "${MODES[@]}"; do
            REPORT="${BASE_DIR}/memory-anchor-${mode}.json"
            if [ ! -f "$REPORT" ] || [ ! -s "$REPORT" ]; then
              echo "::error::memory-anchor-smoke: expected report missing or empty: '$REPORT'."
              exit 1
            fi
          done

          for mode in "${MODES[@]}"; do
            MODE_DIR="${BASE_DIR}/${mode}"
            if [ ! -s "${MODE_DIR}/timeline-anchor.json" ]; then
              echo "::error::memory-anchor-smoke: per-mode anchor missing or empty: '${MODE_DIR}/timeline-anchor.json'."
              exit 1
            fi
          done

      - name: Archive anchor smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repomori-memory-anchor-smoke
          path: |
            ${{ steps.run.outputs.artifact_dir }}/memory-anchor-strict.json
            ${{ steps.run.outputs.artifact_dir }}/memory-anchor-safe.json
            ${{ steps.run.outputs.artifact_dir }}/memory-anchor-legacy.json
            ${{ steps.run.outputs.artifact_dir }}/strict/timeline-anchor.json
            ${{ steps.run.outputs.artifact_dir }}/safe/timeline-anchor.json
            ${{ steps.run.outputs.artifact_dir }}/legacy/timeline-anchor.json
          include-hidden-files: true
