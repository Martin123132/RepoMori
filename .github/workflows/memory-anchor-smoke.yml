name: memory-anchor-smoke

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository root to snapshot."
        required: false
        default: "."
        type: string
      out_dir:
        description: "Output directory for snapshot and anchor smoke artifacts."
        required: false
        default: ".repomori-smoke"
        type: string

jobs:
  smoke:
    name: matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run memory anchor profile smoke matrix
        shell: bash
        run: |
          WORKSPACE_DIR="${GITHUB_WORKSPACE:-$(pwd)}"
          REPO="${{ github.event.inputs.repo || '.' }}"
          BASE="${WORKSPACE_DIR}/${{ github.event.inputs.out_dir || '.repomori-smoke' }}"
          OUT_DIR="${BASE}/packs"
          mkdir -p "$OUT_DIR"

          for mode in strict safe legacy; do
            REPORT="$BASE/memory-anchor-${mode}.json"
            python -m repomori memory "$REPO" \
              --out-dir "$OUT_DIR" \
              --no-handoff \
              --anchor-out "$OUT_DIR/timeline-anchor.json" \
              --anchor-freshness "$mode" \
              --anchor-verify \
              --json > "$REPORT"

            python -c "import json,sys;from pathlib import Path;p=Path(sys.argv[1]);mode=sys.argv[2];payload=json.loads(p.read_text(encoding='utf-8'));summary=payload.get('summary', {});anchor=summary.get('anchor_freshness');status=payload.get('status');assert anchor == mode, 'anchor_freshness mismatch for mode=%s: %s' % (mode, anchor);assert status in ('pass', 'warn'), 'memory status not acceptable for mode=%s: %s' % (mode, status);print('mode=%s status=%s' % (mode, status))" "$REPORT" "$mode"
          done

      - name: Archive anchor smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repomori-memory-anchor-smoke
          path: ${{ github.workspace }}/${{ github.event.inputs.out_dir || '.repomori-smoke' }}
