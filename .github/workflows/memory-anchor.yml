name: memory-anchor

"on":
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository path to snapshot"
        required: false
        default: "."
        type: string
      out_dir:
        description: "Snapshot output directory"
        required: false
        default: ".repomori-packs"
        type: string
      anchor_mode:
        description: "Anchor freshness profile: strict, safe, or legacy."
        required: false
        default: "safe"
        type: choice
        options:
          - strict
          - safe
          - legacy

jobs:
  run_anchor_checks_schedule:
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/memory-anchor-reusable.yml
    with:
      repo: "."
      out_dir: ".repomori-packs"
      anchor_mode: "safe"

  run_anchor_checks_dispatch:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/memory-anchor-reusable.yml
    with:
      repo: ${{ github.event.inputs.repo || '.' }}
      out_dir: ${{ github.event.inputs.out_dir || '.repomori-packs' }}
      anchor_mode: ${{ github.event.inputs.anchor_mode || 'safe' }}
