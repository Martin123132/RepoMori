name: memory-anchor

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  anchor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run memory anchor check
        run: |
          python -m repomori memory . \
            --out-dir .repomori-packs \
            --anchor-out .repomori-packs/timeline-anchor.json \
            --anchor-verify \
            --json > memory-anchor.json

      - name: Validate anchor verification
        run: |
          python - <<'PY'
          import json
          import sys

          payload = json.loads(open("memory-anchor.json", "r", encoding="utf-8").read())
          memory_status = payload.get("status")
          anchor = payload.get("anchor_verification")
          anchor_status = None if anchor is None else anchor.get("status")

          if memory_status != "pass":
            print(f"memory status was {memory_status}")
            sys.exit(1)

          if anchor_status == "fail":
            print("anchor verification failed")
            print(json.dumps(anchor, indent=2))
            sys.exit(1)

          print("memory and anchor verification succeeded")
          print(f"memory status={memory_status}")
          print(f"anchor status={anchor_status}")
          PY
