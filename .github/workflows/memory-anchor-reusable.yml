name: memory-anchor-reusable

on:
  workflow_call:
    inputs:
      repo:
        description: "Path to the repository root to snapshot."
        required: false
        type: string
        default: "."
      out_dir:
        description: "Snapshot output directory (relative or absolute)."
        required: false
        type: string
        default: ".repomori-packs"
      anchor_mode:
        description: "Anchor freshness profile: strict, safe, or legacy."
        required: false
        type: string
        default: "safe"
      python_version:
        description: "Python version used for GitHub runners."
        required: false
        type: string
        default: "3.12"

jobs:
  anchor_check:
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.anchor_mode != 'strict' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "${{ inputs.python_version }}"

      - name: Run memory anchor check
        run: |
          if [ -n "${{ inputs.out_dir }}" ]; then
            ANCHOR_OUT="${{ inputs.out_dir }}/timeline-anchor.json"
          else
            ANCHOR_OUT="timeline-anchor.json"
          fi

          python -m repomori memory "${{ inputs.repo }}" \
            --out-dir "${{ inputs.out_dir }}" \
            --anchor-out "${ANCHOR_OUT}" \
            --anchor-freshness "${{ inputs.anchor_mode }}" \
            --anchor-verify \
            --json > memory-anchor.json

      - name: Validate anchor verification
        run: |
          python - <<'PY'
          import json
          import sys

          try:
              with open("memory-anchor.json", "r", encoding="utf-8-sig") as fp:
                  payload = json.load(fp)
          except json.JSONDecodeError as exc:
              print(f"memory-anchor.json did not contain valid JSON: {exc}")
              sys.exit(1)
          except FileNotFoundError:
              print("memory-anchor.json was not written by the memory run.")
              sys.exit(1)

          memory_status = payload.get("status")
          anchor_mode = "${{ inputs.anchor_mode }}".lower()
          anchor = payload.get("anchor_verification")
          anchor_status = None if anchor is None else anchor.get("status")

          if memory_status == "fail":
              print(f"memory status was {memory_status}")
              sys.exit(1)

          if anchor_mode == "strict" and memory_status != "pass":
              print(f"memory status was {memory_status}")
              sys.exit(1)

          print("memory and anchor verification succeeded")
          print(f"memory status={memory_status}")
          print(f"anchor status={anchor_status}")
          PY
