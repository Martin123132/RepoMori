name: release-candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Expected release or pre-release version.
        required: true
        default: 0.2.0
      ref:
        description: Branch, tag, or SHA to build.
        required: true
        default: main
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_release_candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: version
        name: Validate release version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]
          input_version = os.environ.get("INPUT_VERSION", "").strip()
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          expected = input_version or (ref_name[1:] if ref_name.startswith("v") else project_version)

          if project_version != expected:
              print(f"release version mismatch: pyproject={project_version} expected={expected}")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"project_version={project_version}\n")
              handle.write(f"expected_version={expected}\n")
          print(f"release version ok: {project_version}")
          PY
      - name: Run release check
        run: |
          python -m repomori release-check . \
            --baseline .repomori-scan-baseline.json \
            --fail-on low \
            --artifacts-dir .repomori-release-check \
            --drift-log .repomori-release-check/baseline-drift.jsonl \
            --json
      - name: Build wheel and source archive
        env:
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
        run: |
          set -euo pipefail
          mkdir -p .repomori-release-candidate/dist
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps --wheel-dir .repomori-release-candidate/dist
          git archive --format=zip --output ".repomori-release-candidate/dist/repomori-${PROJECT_VERSION}-source.zip" HEAD
      - name: Install release artifact smoke
        env:
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
        run: |
          set -euo pipefail
          python -m pip install --force-reinstall --no-index \
            --find-links .repomori-release-candidate/dist \
            "repomori==${PROJECT_VERSION}"
          repomori --help >/dev/null
          repomori schema --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.schema.catalog.v1'; print('installed schema smoke passed')"
          repomori contract-check --fixture tests/fixtures/compat-contracts.json --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.contract_check.v1'; assert payload['status'] == 'pass'; print('installed contract smoke passed')"
          repomori demo --out "$RUNNER_TEMP/repomori-release-demo" --force --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.demo.v1'; assert payload['status'] == 'pass'; print('installed demo smoke passed')"
      - name: Write release-candidate manifest
        env:
          PROJECT_VERSION: ${{ steps.version.outputs.project_version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os

          from repomori.codec import write_release_package_artifacts

          payload = write_release_package_artifacts(
              ".repomori-release-candidate",
              version=os.environ["PROJECT_VERSION"],
              commit=os.environ.get("GITHUB_SHA"),
              ref=os.environ.get("GITHUB_REF_NAME"),
              run_id=os.environ.get("GITHUB_RUN_ID"),
              repository=os.environ.get("GITHUB_REPOSITORY"),
              workflow="release-candidate.yml",
          )
          print(json.dumps(payload, indent=2))
          PY
          for artifact in \
            .repomori-release-candidate/release-candidate.json \
            .repomori-release-candidate/release-candidate.md \
            .repomori-release-candidate/checksums.txt \
            .repomori-release-candidate/release-provenance.json \
            .repomori-release-candidate/sbom.spdx.json; do
            if [ ! -s "$artifact" ]; then
              echo "::error::release package artifact was not created: $artifact"
              exit 1
            fi
          done
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".repomori-release-candidate")
          manifest = json.loads((root / "release-candidate.json").read_text(encoding="utf-8"))
          provenance = json.loads((root / "release-provenance.json").read_text(encoding="utf-8"))
          sbom = json.loads((root / "sbom.spdx.json").read_text(encoding="utf-8"))
          assert manifest["schema_version"] == "repomori.release_candidate.v1"
          assert provenance["schema_version"] == "repomori.release_provenance.v1"
          assert sbom["spdxVersion"] == "SPDX-2.3"
          assert manifest["integrity"]["checksums"]["path"] == "checksums.txt"
          assert manifest["integrity"]["provenance"]["path"] == "release-provenance.json"
          assert manifest["integrity"]["sbom"]["path"] == "sbom.spdx.json"
          print("release integrity artifact schemas passed")
          PY
      - name: Verify release package
        run: |
          set -euo pipefail
          python -m repomori verify-release .repomori-release-candidate --json > .repomori-release-candidate/release-verify.json
          python -m repomori verify-release .repomori-release-candidate --format markdown --out .repomori-release-candidate/release-verify.md
          for artifact in \
            .repomori-release-candidate/release-verify.json \
            .repomori-release-candidate/release-verify.md; do
            if [ ! -s "$artifact" ]; then
              echo "::error::release verification artifact was not created: $artifact"
              exit 1
            fi
          done
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(".repomori-release-candidate/release-verify.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == "repomori.release_verify.v1"
          assert report["status"] == "pass"
          assert report["summary"]["mismatched_files"] == 0
          print("release package verification passed")
          PY
      - id: signing
        name: Sign release integrity artifacts
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.REPOMORI_RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.REPOMORI_RELEASE_GPG_PASSPHRASE }}
          RELEASE_GPG_PUBLIC_KEY: ${{ vars.REPOMORI_RELEASE_GPG_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_GPG_PRIVATE_KEY:-}" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "release signing skipped: REPOMORI_RELEASE_GPG_PRIVATE_KEY is not configured"
            exit 0
          fi

          export GNUPGHOME="$RUNNER_TEMP/repomori-gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import

          public_fingerprint=""
          if [ -n "${RELEASE_GPG_PUBLIC_KEY:-}" ]; then
            printf '%s' "$RELEASE_GPG_PUBLIC_KEY" > .repomori-release-candidate/repomori-release-public-key.asc
            public_fingerprint="$(gpg --batch --with-colons --show-keys .repomori-release-candidate/repomori-release-public-key.asc | awk -F: '/^fpr:/ {print $10; exit}')"
            if [ -z "$public_fingerprint" ]; then
              echo "::error::release public key variable is not a parseable GPG public key"
              exit 1
            fi
          else
            echo "release public key artifact skipped: REPOMORI_RELEASE_GPG_PUBLIC_KEY variable is not configured"
          fi

          passphrase_args=()
          if [ -n "${RELEASE_GPG_PASSPHRASE:-}" ]; then
            passphrase_args=(--pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE")
          fi

          key_fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ -n "$public_fingerprint" ] && [ "$public_fingerprint" != "$key_fingerprint" ]; then
            echo "::error::release public key fingerprint does not match signing key fingerprint"
            exit 1
          fi

          for artifact in checksums.txt release-provenance.json sbom.spdx.json release-verify.json; do
            gpg --batch --yes "${passphrase_args[@]}" --armor --detach-sign \
              --output ".repomori-release-candidate/${artifact}.asc" \
              ".repomori-release-candidate/${artifact}"
            if [ ! -s ".repomori-release-candidate/${artifact}.asc" ]; then
              echo "::error::release signature was not created: ${artifact}.asc"
              exit 1
            fi
          done

          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "key_fingerprint=$key_fingerprint" >> "$GITHUB_OUTPUT"
          echo "release signing complete: key_fingerprint=$key_fingerprint"
      - name: Write release evidence package
        run: |
          set -euo pipefail
          python -m repomori release-evidence .repomori-release-candidate \
            --repo . \
            --release-check .repomori-release-check/release-check.json \
            --out-dir .repomori-release-candidate
          for artifact in \
            .repomori-release-candidate/release-evidence.json \
            .repomori-release-candidate/release-evidence.md; do
            if [ ! -s "$artifact" ]; then
              echo "::error::release evidence artifact was not created: $artifact"
              exit 1
            fi
          done
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(".repomori-release-candidate/release-evidence.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == "repomori.release_evidence.v1"
          assert report["status"] != "fail"
          assert report["checks"]["release_verify"]["status"] == "pass"
          assert report["checks"]["release_check"]["status"] == "pass"
          print("release evidence package passed")
          PY
      - name: Upload release-candidate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repomori-release-candidate-${{ steps.version.outputs.project_version }}
          include-hidden-files: true
          path: |
            .repomori-release-candidate/
            .repomori-release-candidate/checksums.txt
            .repomori-release-candidate/release-provenance.json
            .repomori-release-candidate/sbom.spdx.json
            .repomori-release-candidate/release-verify.json
            .repomori-release-candidate/release-verify.md
            .repomori-release-candidate/release-evidence.json
            .repomori-release-candidate/release-evidence.md
            .repomori-release-candidate/*.asc
            .repomori-release-check/release-check.json
            .repomori-release-check/release-check.md
            .repomori-release-check/baseline-drift.jsonl
