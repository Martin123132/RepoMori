name: publish-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version that must match pyproject.toml.
        required: true
        default: 0.2.0
      ref:
        description: Branch, tag, or SHA to build and publish from.
        required: true
        default: main
      tag:
        description: Release tag to create or update; defaults to v<version>.
        required: false
        default: ""
      notes_file:
        description: Release notes file; defaults to docs/releases/<version>.md.
        required: false
        default: ""
      prerelease:
        description: Mark the draft release as a pre-release.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      overwrite_draft:
        description: Allow updating an existing draft release and replacing assets.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      release_policy:
        description: Optional release policy JSON file to enforce after release evidence is written.
        required: false
        default: tests/fixtures/release-policy-basic.json

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: release_inputs
        name: Validate publish inputs
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_NOTES_FILE: ${{ inputs.notes_file }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_OVERWRITE_DRAFT: ${{ inputs.overwrite_draft }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = pyproject["project"]["version"]
          input_version = os.environ["INPUT_VERSION"].strip()
          if project_version != input_version:
              print(f"release version mismatch: pyproject={project_version} input={input_version}")
              sys.exit(1)

          release_tag = os.environ.get("INPUT_TAG", "").strip() or f"v{input_version}"
          notes_file = os.environ.get("INPUT_NOTES_FILE", "").strip() or f"docs/releases/{input_version}.md"
          notes_path = Path(notes_file)
          if not notes_path.is_file():
              print(f"release notes file not found: {notes_file}")
              sys.exit(1)

          prerelease = os.environ["INPUT_PRERELEASE"].strip().lower()
          overwrite_draft = os.environ["INPUT_OVERWRITE_DRAFT"].strip().lower()
          if prerelease not in {"true", "false"}:
              print(f"invalid prerelease input: {prerelease}")
              sys.exit(1)
          if overwrite_draft not in {"true", "false"}:
              print(f"invalid overwrite_draft input: {overwrite_draft}")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"project_version={project_version}\n")
              handle.write(f"release_tag={release_tag}\n")
              handle.write(f"notes_file={notes_file}\n")
              handle.write(f"prerelease={prerelease}\n")
              handle.write(f"overwrite_draft={overwrite_draft}\n")
          print(f"publish inputs ok: version={project_version} tag={release_tag} notes={notes_file}")
          PY
      - name: Run release check
        run: |
          python -m repomori release-check . \
            --baseline .repomori-scan-baseline.json \
            --fail-on low \
            --artifacts-dir .repomori-release-check \
            --drift-log .repomori-release-check/baseline-drift.jsonl \
            --json
      - name: Build wheel and source archive
        env:
          PROJECT_VERSION: ${{ steps.release_inputs.outputs.project_version }}
        run: |
          set -euo pipefail
          mkdir -p .repomori-release-candidate/dist
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps --wheel-dir .repomori-release-candidate/dist
          git archive --format=zip --output ".repomori-release-candidate/dist/repomori-${PROJECT_VERSION}-source.zip" HEAD
      - name: Install release artifact smoke
        env:
          PROJECT_VERSION: ${{ steps.release_inputs.outputs.project_version }}
        run: |
          set -euo pipefail
          python -m pip install --force-reinstall --no-index \
            --find-links .repomori-release-candidate/dist \
            "repomori==${PROJECT_VERSION}"
          repomori --help >/dev/null
          repomori schema --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.schema.catalog.v1'; print('installed schema smoke passed')"
          repomori contract-check --fixture tests/fixtures/compat-contracts.json --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.contract_check.v1'; assert payload['status'] == 'pass'; print('installed contract smoke passed')"
          repomori demo --out "$RUNNER_TEMP/repomori-release-demo" --force --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.demo.v1'; assert payload['status'] == 'pass'; print('installed demo smoke passed')"
      - name: Write release package integrity artifacts
        env:
          PROJECT_VERSION: ${{ steps.release_inputs.outputs.project_version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os

          from repomori.codec import write_release_package_artifacts

          payload = write_release_package_artifacts(
              ".repomori-release-candidate",
              version=os.environ["PROJECT_VERSION"],
              commit=os.environ.get("GITHUB_SHA"),
              ref=os.environ.get("GITHUB_REF_NAME"),
              run_id=os.environ.get("GITHUB_RUN_ID"),
              repository=os.environ.get("GITHUB_REPOSITORY"),
              workflow="publish-release.yml",
          )
          print(json.dumps(payload, indent=2))
          PY
      - name: Verify release package
        run: |
          set -euo pipefail
          python -m repomori verify-release .repomori-release-candidate --json > .repomori-release-candidate/release-verify.json
          python -m repomori verify-release .repomori-release-candidate --format markdown --out .repomori-release-candidate/release-verify.md
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(".repomori-release-candidate/release-verify.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == "repomori.release_verify.v1"
          assert report["status"] == "pass"
          assert report["summary"]["mismatched_files"] == 0
          print("release package verification passed")
          PY
      - id: signing
        name: Sign release integrity artifacts
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.REPOMORI_RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.REPOMORI_RELEASE_GPG_PASSPHRASE }}
          RELEASE_GPG_PUBLIC_KEY: ${{ vars.REPOMORI_RELEASE_GPG_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_GPG_PRIVATE_KEY:-}" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "release signing skipped: REPOMORI_RELEASE_GPG_PRIVATE_KEY is not configured"
            exit 0
          fi

          export GNUPGHOME="$RUNNER_TEMP/repomori-gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import

          public_fingerprint=""
          if [ -n "${RELEASE_GPG_PUBLIC_KEY:-}" ]; then
            printf '%s' "$RELEASE_GPG_PUBLIC_KEY" > .repomori-release-candidate/repomori-release-public-key.asc
            public_fingerprint="$(gpg --batch --with-colons --show-keys .repomori-release-candidate/repomori-release-public-key.asc | awk -F: '/^fpr:/ {print $10; exit}')"
            if [ -z "$public_fingerprint" ]; then
              echo "::error::release public key variable is not a parseable GPG public key"
              exit 1
            fi
          else
            echo "release public key artifact skipped: REPOMORI_RELEASE_GPG_PUBLIC_KEY variable is not configured"
          fi

          passphrase_args=()
          if [ -n "${RELEASE_GPG_PASSPHRASE:-}" ]; then
            passphrase_args=(--pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE")
          fi

          key_fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ -n "$public_fingerprint" ] && [ "$public_fingerprint" != "$key_fingerprint" ]; then
            echo "::error::release public key fingerprint does not match signing key fingerprint"
            exit 1
          fi

          for artifact in checksums.txt release-provenance.json sbom.spdx.json release-verify.json; do
            gpg --batch --yes "${passphrase_args[@]}" --armor --detach-sign \
              --output ".repomori-release-candidate/${artifact}.asc" \
              ".repomori-release-candidate/${artifact}"
            if [ ! -s ".repomori-release-candidate/${artifact}.asc" ]; then
              echo "::error::release signature was not created: ${artifact}.asc"
              exit 1
            fi
          done

          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "key_fingerprint=$key_fingerprint" >> "$GITHUB_OUTPUT"
          echo "release signing complete: key_fingerprint=$key_fingerprint"
      - name: Write release evidence package
        run: |
          set -euo pipefail
          python -m repomori release-evidence .repomori-release-candidate \
            --repo . \
            --release-check .repomori-release-check/release-check.json \
            --out-dir .repomori-release-candidate
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path(".repomori-release-candidate/release-evidence.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == "repomori.release_evidence.v1"
          assert report["status"] != "fail"
          assert report["checks"]["release_verify"]["status"] == "pass"
          assert report["checks"]["release_check"]["status"] == "pass"
          print("release evidence package passed")
          PY
      - name: Verify release policy gate
        env:
          RELEASE_POLICY: ${{ inputs.release_policy || 'tests/fixtures/release-policy-basic.json' }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_POLICY:-}" ]; then
            echo "release policy gate skipped: no release_policy input"
            exit 0
          fi
          if [ ! -f "$RELEASE_POLICY" ]; then
            echo "::error::release policy file was not found: $RELEASE_POLICY"
            exit 1
          fi
          python -m repomori verify-release .repomori-release-candidate \
            --policy "$RELEASE_POLICY" \
            --json > .repomori-release-candidate/release-verify-policy.json
          python -m repomori verify-release .repomori-release-candidate \
            --policy "$RELEASE_POLICY" \
            --format markdown \
            --out .repomori-release-candidate/release-verify-policy.md
          for artifact in \
            .repomori-release-candidate/release-verify-policy.json \
            .repomori-release-candidate/release-verify-policy.md; do
            if [ ! -s "$artifact" ]; then
              echo "::error::release policy verification artifact was not created: $artifact"
              exit 1
            fi
          done
          python - <<'PY'
          import json
          from pathlib import Path
          from repomori.codec import (
              build_release_candidate_reviewer_handoff,
              build_release_review_decision_log,
              check_release_review_decision_log_privacy,
              check_release_candidate_review_bundle,
              format_release_candidate_artifact_index_markdown,
              format_release_candidate_reviewer_handoff_markdown,
              format_release_review_decision_log_markdown,
              format_release_review_checklist_markdown,
          )

          report = json.loads(Path(".repomori-release-candidate/release-verify-policy.json").read_text(encoding="utf-8"))
          evidence = json.loads(Path(".repomori-release-candidate/release-evidence.json").read_text(encoding="utf-8"))
          markdown = Path(".repomori-release-candidate/release-verify-policy.md").read_text(encoding="utf-8")
          checklist = format_release_review_checklist_markdown(report, evidence)
          index = format_release_candidate_artifact_index_markdown(report, evidence)
          Path(".repomori-release-candidate/release-review-checklist.md").write_text(checklist, encoding="utf-8")
          Path(".repomori-release-candidate/release-artifact-index.md").write_text(index, encoding="utf-8")
          provisional_bundle = check_release_candidate_review_bundle(".repomori-release-candidate", require_handoff=False)
          handoff = build_release_candidate_reviewer_handoff(report, evidence, provisional_bundle)
          handoff_markdown = format_release_candidate_reviewer_handoff_markdown(handoff)
          Path(".repomori-release-candidate/release-review-handoff.json").write_text(json.dumps(handoff, indent=2) + "\n", encoding="utf-8")
          Path(".repomori-release-candidate/release-review-handoff.md").write_text(handoff_markdown, encoding="utf-8")
          bundle = check_release_candidate_review_bundle(".repomori-release-candidate")
          Path(".repomori-release-candidate/release-bundle-completeness.json").write_text(json.dumps(bundle, indent=2) + "\n", encoding="utf-8")
          decision_log = build_release_review_decision_log(report, evidence, bundle, handoff)
          decision_markdown = format_release_review_decision_log_markdown(decision_log)
          privacy_guard = check_release_review_decision_log_privacy(decision_log, decision_markdown)
          Path(".repomori-release-candidate/release-review-decision-log.json").write_text(json.dumps(decision_log, indent=2) + "\n", encoding="utf-8")
          Path(".repomori-release-candidate/release-review-decision-log.md").write_text(decision_markdown, encoding="utf-8")
          assert report["schema_version"] == "repomori.release_verify.v1"
          assert report["status"] == "pass"
          assert report["policy"]["schema_version"] == "repomori.release_policy.v1"
          assert report["policy"]["status"] == "pass"
          assert report["policy"]["review"]["decision"] == "reviewable"
          assert report["policy"]["review"]["profile"]
          assert "## Policy" in markdown
          assert "Review decision: `reviewable`" in markdown
          assert "### Policy Profile Preflight" in markdown
          assert "docs/release-policy-selection.md" in markdown
          assert "docs/release-policy-matrix.md" in markdown
          assert "docs/release-policy.md#policy-diagnostics" in markdown
          assert "### Reviewer Next Steps" in markdown
          assert "## Final Reviewer Decision" in checklist
          assert "Selected profile:" in checklist
          assert "Policy outcome:" in checklist
          assert "Artifact Hash And Provenance Checks" in checklist
          assert "Final reviewer decision: `pending`" in checklist
          assert "RepoMori Release Candidate Artifact Index" in index
          assert "Selected policy profile:" in index
          assert "release-verify-policy.md" in index
          assert "release-review-checklist.md" in index
          assert "release-review-handoff.md" in index
          assert "release-bundle-completeness.json" in index
          assert "release-review-decision-log.md" in index
          assert "Provisional completeness" in index
          assert "Final fail-fast completeness" in index
          assert "Diagnostics References" in index
          assert bundle["schema_version"] == "repomori.release_review_bundle.v1"
          assert bundle["status"] == "pass", bundle
          assert bundle["summary"]["selected_profile"]
          assert handoff["schema_version"] == "repomori.release_review_handoff.v1"
          assert handoff["status"] == "pass", handoff
          assert handoff["profile"]
          assert "release-artifact-index.md" in handoff_markdown
          assert "release-review-checklist.md" in handoff_markdown
          assert "docs/release-policy.md#policy-diagnostics" in handoff_markdown
          assert decision_log["schema_version"] == "repomori.release_review_decision_log.v1"
          assert decision_log["status"] == "pass", decision_log
          assert decision_log["privacy_guard"]["status"] == "pass", decision_log["privacy_guard"]
          assert decision_log["privacy_guard"]["summary"]["issue_counts_by_code"] == {}, decision_log["privacy_guard"]
          assert privacy_guard["schema_version"] == "repomori.release_review_privacy_guard.v1"
          assert privacy_guard["status"] == "pass", privacy_guard
          assert privacy_guard["summary"]["issue_counts_by_code"] == {}, privacy_guard
          assert decision_log["reviewer_outcome"]["decision"] == "pending"
          assert "release-review-handoff.md" in decision_markdown
          assert "Public-Safety And Privacy Confirmations" in decision_markdown
          assert "Privacy Guard" in decision_markdown
          assert "Final reviewer decision: `pending`" in decision_markdown
          print("release policy gate passed")
          PY
      - name: Publish draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_inputs.outputs.release_tag }}
          RELEASE_TITLE: RepoMori ${{ steps.release_inputs.outputs.project_version }}
          NOTES_FILE: ${{ steps.release_inputs.outputs.notes_file }}
          PRERELEASE: ${{ steps.release_inputs.outputs.prerelease }}
          OVERWRITE_DRAFT: ${{ steps.release_inputs.outputs.overwrite_draft }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(
            .repomori-release-candidate/dist/*.whl
            .repomori-release-candidate/dist/*-source.zip
            .repomori-release-candidate/checksums.txt
            .repomori-release-candidate/release-provenance.json
            .repomori-release-candidate/sbom.spdx.json
            .repomori-release-candidate/release-verify.json
            .repomori-release-candidate/release-verify.md
            .repomori-release-candidate/release-verify-policy.*
            .repomori-release-candidate/release-review-checklist.*
            .repomori-release-candidate/release-artifact-index.*
            .repomori-release-candidate/release-bundle-completeness.*
            .repomori-release-candidate/release-review-handoff.*
            .repomori-release-candidate/release-review-decision-log.*
            .repomori-release-candidate/release-evidence.json
            .repomori-release-candidate/release-evidence.md
            .repomori-release-candidate/release-candidate.json
            .repomori-release-candidate/release-candidate.md
            .repomori-release-candidate/*.asc
          )
          for asset in "${assets[@]}"; do
            if [ ! -s "$asset" ]; then
              echo "::error::release asset was not created: $asset"
              exit 1
            fi
          done

          if gh release view "$RELEASE_TAG" --json isDraft,tagName,name > "$RUNNER_TEMP/release.json" 2>/dev/null; then
            is_draft="$(python -c "import json, pathlib; print(str(json.loads(pathlib.Path('$RUNNER_TEMP/release.json').read_text())['isDraft']).lower())")"
            if [ "$is_draft" != "true" ]; then
              echo "::error::Refusing to overwrite a published release: $RELEASE_TAG"
              exit 1
            fi
            if [ "$OVERWRITE_DRAFT" != "true" ]; then
              echo "::error::Draft release already exists and overwrite_draft=false: $RELEASE_TAG"
              exit 1
            fi
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE"
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            create_args=(release create "$RELEASE_TAG" "${assets[@]}" --draft --target "$GITHUB_SHA" --title "$RELEASE_TITLE" --notes-file "$NOTES_FILE")
            if [ "$PRERELEASE" = "true" ]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}"
          fi
      - name: Upload publish package artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repomori-publish-release-${{ steps.release_inputs.outputs.project_version }}
          include-hidden-files: true
          path: |
            .repomori-release-candidate/
            .repomori-release-check/release-check.json
            .repomori-release-check/release-check.md
            .repomori-release-check/baseline-drift.jsonl
