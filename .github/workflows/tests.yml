name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -s tests

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Preflight release-check workspace
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          repo = Path(".").resolve()
          generated_dirs = {
              "pack",
              "packs",
              "benchmark",
              "benchmarks",
              "handoff",
              "handoffs",
          }
          blocked = []
          for child in sorted(repo.iterdir()):
              rel = child.name
              lower = rel.lower()
              if rel in {".git", ".github"}:
                  continue
              if rel.startswith(".repomori-"):
                  continue
              if child.is_dir() and lower in generated_dirs:
                  blocked.append(f"directory: {child}")
              if child.is_file() and child.suffix.lower() == ".repomori":
                  blocked.append(f"file: {child}")

          if blocked:
              print("release-check preflight blocked by visible top-level artifacts:")
              for item in blocked:
                  print(f" - {item}")
              print("Move generated outputs under hidden directories for this repo, for example:")
              print("  - .repomori-packs")
              print("  - .repomori-release-check")
              print("  - .repomori-release-health")
              print("  - .repomori-health")
              print("Then rerun release-check from a clean repo root.")
              sys.exit(1)

          print("release-check preflight passed")
          PY
      - name: Run release check
        run: |
          python -m repomori release-check . \
            --baseline .repomori-scan-baseline.json \
            --fail-on low \
            --artifacts-dir .repomori-release-check \
            --drift-log .repomori-release-check/baseline-drift.jsonl \
            --json
      - name: Upload release-check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repomori-release-check-artifacts
          path: |
            .repomori-release-check/release-check.json
            .repomori-release-check/release-check.md
            .repomori-release-check/baseline-drift.jsonl
