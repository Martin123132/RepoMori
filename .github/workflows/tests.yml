name: tests

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -s tests

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package from checkout
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Run installed CLI smoke
        shell: bash
        run: |
          set -euo pipefail
          REPO_ROOT="$PWD"
          WORK_DIR="$RUNNER_TEMP/repomori-package-smoke"
          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          pushd "$WORK_DIR"
          repomori --help >/dev/null
          python -m repomori schema --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.schema.catalog.v1'; print('python -m repomori schema smoke passed')"
          repomori schema --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.schema.catalog.v1'; print('console script schema smoke passed')"
          repomori commands --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.cli_commands.v1'; assert 'commands' in payload['summary']['commands']; print('console script commands smoke passed')"
          repomori commands --format markdown --out "$WORK_DIR/cli-reference.md"
          test -s "$WORK_DIR/cli-reference.md"
          repomori demo --out "$WORK_DIR/demo" --force --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.demo.v1'; assert payload['status'] == 'pass'; print('console script demo smoke passed')"
          repomori contract-check --fixture "$REPO_ROOT/tests/fixtures/compat-contracts.json" --json | python -c "import json, sys; payload=json.load(sys.stdin); assert payload['schema_version'] == 'repomori.contract_check.v1'; assert payload['status'] == 'pass'; print('console script contract-check smoke passed')"
          repomori release-rehearsal --out "$WORK_DIR/release-rehearsal" --force --json > "$WORK_DIR/release-rehearsal-output.json"
          REHEARSAL_DIR="$WORK_DIR/release-rehearsal" REHEARSAL_JSON="$WORK_DIR/release-rehearsal-output.json" python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(os.environ["REHEARSAL_JSON"]).read_text(encoding="utf-8"))
          root = Path(os.environ["REHEARSAL_DIR"])
          assert report["schema_version"] == "repomori.release_rehearsal.v1"
          assert report["status"] == "pass"
          assert report["checks"]["release_evidence"]["status"] == "pass"
          assert report["checks"]["release_policy"]["status"] == "pass"
          assert report["summary"]["privacy_guard_demo_status"] == "pass"
          assert report["summary"]["clean_guard_status"] == "pass"
          assert report["summary"]["failing_guard_status"] == "fail"
          assert report["summary"]["leaked_marker_confirmation"] == "none"
          assert report["checks"]["reviewer_artifact_privacy"]["status"] == "pass"
          assert report["summary"]["storage_path_policy_status"] == "pass"
          assert report["checks"]["storage_path_policy"]["status"] == "pass"
          assert report["checks"]["storage_path_policy"]["summary"]["issue_count"] == 0
          checklist = (root / "release-review-checklist.md").read_text(encoding="utf-8")
          assert "Release-Check Privacy Demo Result" in checklist
          raw_markers = (
              "api_key=",
              "https://internal",
              "C:\\Users\\reviewer",
              "proprietary source",
              "SYNTHETIC_RAW_DUMP_PLACEHOLDER",
              "/home/",
              "/tmp/",
          )
          for artifact in report["reviewer_artifacts"]:
              text = (root / artifact["path"]).read_text(encoding="utf-8")
              for marker in raw_markers:
                  assert marker not in text, f"raw marker {marker!r} leaked into {artifact['path']}"
          print("console script release-rehearsal smoke passed")
          PY
          popd

  workflow-self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate workflow YAML contract
        run: |
          python - <<'PY'
          import importlib.util
          from typing import Any
          import sys
          from pathlib import Path


          def fail(message: str, *, path: str | None = None) -> None:
              prefix = f"{path}: " if path else ""
              print(f"workflow self-check failed: {prefix}{message}")
              raise SystemExit(1)

          def has_trigger(payload: dict[str, Any], *, path: str | None = None) -> None:
              if "on" in payload:
                  return
              if True in payload:
                  return
              fail("workflow is missing parsed trigger declaration", path=path)

          workflow_dir = Path(".github/workflows")
          workflow_paths = [
              workflow_dir / "memory-anchor-smoke.yml",
              workflow_dir / "release-health.yml",
              workflow_dir / "handoff-health.yml",
              workflow_dir / "memory-anchor.yml",
              workflow_dir / "memory-anchor-reusable.yml",
          ]

          yaml_spec = importlib.util.find_spec("yaml")
          fallback_mode = yaml_spec is None
          if fallback_mode:
              print("PyYAML unavailable; using resilient string-based workflow checks.")
          else:
              import yaml

          for path in workflow_paths:
              if not path.exists():
                  fail("workflow file is missing", path=str(path))
              text = path.read_text(encoding="utf-8")
              if path.name == "memory-anchor-smoke.yml":
                  if "MODES=(strict safe legacy)" not in text:
                      fail("expected smoke mode matrix is missing", path=str(path))
                  if "memory-anchor-${mode}.json" not in text:
                      fail("smoke artifact naming contract is missing", path=str(path))
                  if "timeline-anchor.json" not in text:
                      fail("smoke anchor output contract is missing", path=str(path))
              if path.name == "release-health.yml":
                  if "--drift-log" not in text:
                      fail("release-health command contract missing --drift-log", path=str(path))
                  if "release-health.json" not in text or "release-health.md" not in text:
                      fail("release-health required artifacts are not declared", path=str(path))
                  if "compat.json" not in text or "contract-check.json" not in text:
                      fail("release-health contract artifacts are not declared", path=str(path))
              if path.name == "handoff-health.yml":
                  if "workflow_dispatch" not in text or "workflow_call" not in text:
                      fail("handoff-health workflow trigger contract changed", path=str(path))
                  if "handoff-health" not in text or "--health-log" not in text:
                      fail("handoff-health command contract missing", path=str(path))
                  if "handoff-health.json" not in text or "handoff-health.md" not in text:
                      fail("handoff-health required artifacts are not declared", path=str(path))
              if path.name == "memory-anchor.yml":
                  if "inputs.anchor_mode" not in text:
                      fail("memory-anchor reusable dispatcher contract changed", path=str(path))
              if path.name == "memory-anchor-reusable.yml":
                  if "anchor_mode" not in text or "--anchor-freshness" not in text:
                      fail("reusable memory-anchor contract changed", path=str(path))

              if not fallback_mode:
                  payload = yaml.safe_load(text)
                  if not isinstance(payload, dict):
                      fail("workflow content did not parse as mapping", path=str(path))
                  has_trigger(payload, path=str(path))
                  if "jobs" not in payload:
                      fail("workflow is missing required keys", path=str(path))
                  if not isinstance(payload.get("jobs"), dict):
                      fail("workflow jobs block is not a mapping", path=str(path))

          print("workflow YAML contract checks passed.")
          PY
      - id: workflow_self_check
        name: Run workflow command contract smoke
        shell: bash
        run: |
          set -euo pipefail
          BASE_DIR="${RUNNER_TEMP}/repomori-workflow-smoke"
          SMOKE_PACKS="${BASE_DIR}/packs"
          HEALTH_OUT="${BASE_DIR}/release-health"
          DRIFT_LOG="${BASE_DIR}/baseline-drift.jsonl"
          rm -rf "$BASE_DIR"
          mkdir -p "$SMOKE_PACKS" "$HEALTH_OUT"
          echo "base_dir=$BASE_DIR" >> "$GITHUB_OUTPUT"
          echo "health_out=$HEALTH_OUT" >> "$GITHUB_OUTPUT"
          echo "smoke_packs=$SMOKE_PACKS" >> "$GITHUB_OUTPUT"
          echo "drift_log=$DRIFT_LOG" >> "$GITHUB_OUTPUT"

          for mode in strict safe legacy; do
            REPORT="${BASE_DIR}/memory-anchor-${mode}.json"
            MODE_ANCHOR="${SMOKE_PACKS}/timeline-anchor.json"
            echo "Running memory smoke mode=${mode}"
            echo "  report target=${REPORT}"
            echo "  anchor target=${MODE_ANCHOR}"
            if ! python -m repomori memory . \
              --out-dir "$SMOKE_PACKS" \
              --no-handoff \
              --anchor-out "$MODE_ANCHOR" \
              --anchor-freshness "$mode" \
              --anchor-verify \
              --json > "$REPORT"; then
              echo "::error::workflow self-check: repomori memory failed for mode ${mode}."
              exit 1
            fi
            if [ ! -s "$REPORT" ]; then
              echo "::error::workflow self-check: missing memory smoke report for mode $mode."
              exit 1
            fi
            if [ ! -f "$REPORT" ]; then
              echo "::error::workflow self-check: report file was not created for mode $mode."
              exit 1
            fi
            if [ ! -s "$MODE_ANCHOR" ]; then
              echo "::error::workflow self-check: anchor not emitted for mode $mode."
              exit 1
            fi
            REPORT_PATH="$REPORT" ANCHOR_PATH="$MODE_ANCHOR" MODE="$mode" python -c "import json, os; from pathlib import Path; report=Path(os.environ['REPORT_PATH']); anchor_path=Path(os.environ['ANCHOR_PATH']); mode=os.environ['MODE']; payload=json.loads(report.read_text(encoding='utf-8')); anchor=payload.get('summary', {}).get('anchor_freshness'); status=payload.get('status'); anchor_verification=payload.get('summary', {}).get('anchor_verification_status'); assert anchor == mode, f'anchor_freshness mismatch for mode={mode}: {anchor}'; assert status in {'pass','warn'}, f'memory status was {status} for mode={mode}'; assert anchor_path.is_file(), f'anchor file was not found for mode={mode}'; anchor_exists = 'yes' if anchor_path.exists() else 'no'; print(f'mode={mode} status={status} anchor_verification_status={anchor_verification} anchor_exists={anchor_exists} report_bytes={report.stat().st_size}')"
            echo "  mode ${mode} validation complete"
          done

          for mode in strict safe legacy; do
            if [ ! -s "${BASE_DIR}/memory-anchor-${mode}.json" ]; then
              echo "::error::workflow self-check: missing emitted memory smoke artifact for mode ${mode}."
              exit 1
            fi
          done

          if [ ! -s "${BASE_DIR}/memory-anchor-strict.json" ] \
            || [ ! -s "${BASE_DIR}/memory-anchor-safe.json" ] \
            || [ ! -s "${BASE_DIR}/memory-anchor-legacy.json" ]; then
            echo "::error::workflow self-check: one or more memory smoke artifacts were not generated."
            exit 1
          fi

          if ! python -m repomori release-health . \
            --snapshot-dir "$SMOKE_PACKS" \
            --skip-tests \
            --skip-demo \
            --baseline .repomori-scan-baseline.json \
            --json \
            --artifacts-dir "$HEALTH_OUT" \
            --drift-log "$DRIFT_LOG"; then
            echo "::error::workflow self-check: release-health smoke command failed."
            exit 1
          fi

          if [ ! -f "$HEALTH_OUT/release-health.json" ] || [ ! -s "$HEALTH_OUT/release-health.json" ]; then
            echo "::error::workflow self-check: release-health JSON artifact was not created."
            exit 1
          fi
          if [ ! -f "$HEALTH_OUT/release-health.md" ] || [ ! -s "$HEALTH_OUT/release-health.md" ]; then
            echo "::error::workflow self-check: release-health markdown artifact was not created."
            exit 1
          fi
          if [ ! -f "$HEALTH_OUT/compat.json" ] || [ ! -s "$HEALTH_OUT/compat.json" ]; then
            echo "::error::workflow self-check: release-health compat JSON artifact was not created."
            exit 1
          fi
          if [ ! -f "$HEALTH_OUT/contract-check.json" ] || [ ! -s "$HEALTH_OUT/contract-check.json" ]; then
            echo "::error::workflow self-check: release-health contract-check JSON artifact was not created."
            exit 1
          fi
          if [ ! -f "$DRIFT_LOG" ] || [ ! -s "$DRIFT_LOG" ]; then
            echo "::error::workflow self-check: release-health drift log was not written."
            exit 1
          fi

          RELEASE_HEALTH_PATH="$HEALTH_OUT/release-health.json" CONTRACT_PATH="$HEALTH_OUT/contract-check.json" python -c "import json, os; from pathlib import Path; payload=json.loads(Path(os.environ['RELEASE_HEALTH_PATH']).read_text(encoding='utf-8')); contract=json.loads(Path(os.environ['CONTRACT_PATH']).read_text(encoding='utf-8')); assert payload.get('schema_version') == 'repomori.health.v1', 'release-health schema_version was unexpected'; assert 'checks' in payload, 'release-health payload is missing checks'; assert 'contract' in payload['checks'], 'release-health payload is missing contract check'; assert payload.get('artifacts', {}).get('json') is not None, 'release-health artifacts.json path missing'; assert contract.get('schema_version') == 'repomori.contract_check.v1', 'contract-check schema_version was unexpected'; print('release-health contract smoke passed')"
      - name: Archive workflow self-check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repomori-workflow-self-check
          path: |
            ${{ steps.workflow_self_check.outputs.base_dir }}/

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Preflight release-check workspace
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          repo = Path(".").resolve()
          generated_dirs = {
              "pack",
              "packs",
              "benchmark",
              "benchmarks",
              "handoff",
              "handoffs",
          }
          blocked = []
          for child in sorted(repo.iterdir()):
              rel = child.name
              lower = rel.lower()
              if rel in {".git", ".github"}:
                  continue
              if rel.startswith(".repomori-"):
                  continue
              if child.is_dir() and lower in generated_dirs:
                  blocked.append(f"directory: {child}")
              if child.is_file() and child.suffix.lower() == ".repomori":
                  blocked.append(f"file: {child}")

          if blocked:
              print("release-check preflight blocked by visible top-level artifacts:")
              for item in blocked:
                  print(f" - {item}")
              print("Move generated outputs under hidden directories for this repo, for example:")
              print("  - .repomori-packs")
              print("  - .repomori-release-check")
              print("  - .repomori-release-health")
              print("  - .repomori-health")
              print("Then rerun release-check from a clean repo root.")
              sys.exit(1)

          print("release-check preflight passed")
          PY
      - name: Run release check
        run: |
          python -m repomori release-check . \
            --baseline .repomori-scan-baseline.json \
            --fail-on low \
            --artifacts-dir .repomori-release-check \
            --drift-log .repomori-release-check/baseline-drift.jsonl \
            --json
      - name: Upload release-check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repomori-release-check-artifacts
          path: |
            .repomori-release-check/release-check.json
            .repomori-release-check/release-check.md
            .repomori-release-check/baseline-drift.jsonl
